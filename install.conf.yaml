- defaults:
    link:
      create: true
      relink: true

- clean:
    ~/:
      force: true
    ~/.config:
      recursive: true

- link:
    ~/.config/nvim:
        path: configs/nvim
    ~/.config/ghostty:
        path: configs/ghostty
    ~/.config/alacritty:
        path: configs/alacritty
    ~/.config/mise:
        path: configs/mise
    ~/.config/tmux:
        path: configs/tmux
    ~/.config/zellij:
        path: configs/zellij
    ~/.config/yazi:
        path: configs/yazi
    ~/.config/karabiner:
        path: configs/karabiner
    ~/.config/fish:
        path: configs/fish
    ~/.config/lazygit:
        path: configs/lazygit
    ~/.config/opencode:
        path: configs/opencode
    ~/.config/starship.toml:
        path: configs/starship/starship.toml
    ~/.hammerspoon:
        path: configs/hammerspoon
    ~/.zshrc:
        path: configs/zsh/.zshrc


- shell:
    - [git submodule update --init --recursive, Installing submodules]
    -
      description: Installing linux dependencies
      command: |
        if [ "$(uname)" = "Linux" ]; then
          if ! dpkg -s build-essential >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y build-essential
          fi
        fi
      stdin: true
      stdout: true
      stderr: true
    -
      description: Installing homebrew packages
      command: brew bundle --cleanup --force-cleanup -v --file configs/Brewfile
      stdin: true
      stdout: true
      stderr: true
    -
      description: Set fish as default shell (only if needed)
      command: |
        if [ "$SHELL" != "$(command -v fish)" ]; then
          echo "$(command -v fish)" | sudo tee -a /etc/shells
          chsh -s "$(command -v fish)"
        fi
      stdin: true
      stdout: true
      stderr: true
    -
      description: Install mise tools
      command: mise install
      stdin: true
      stdout: true
      stderr: true
    -
      description: Applying MacOS settings
      command: |
        if [ "$(uname)" = "Darwin" ]; then
          sh platforms/mac/settings.sh
        fi
      stdin: true
      stdout: true
      stderr: true
